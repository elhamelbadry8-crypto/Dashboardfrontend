<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome - AKLTECH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1f2937;
        }

        .welcome-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .logo-placeholder {
            font-size: 3rem;
            color: #2563eb;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #111827;
        }

        p {
            color: #4b5563;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* تنسيق الزر الجديد للانتقال للتقارير */
        .btn-go-reports {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #10b981; /* تغيير اللون للأخضر المميّز للتقارير والبيانات */
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 1rem;
            transition: background-color 0.2s ease;
            width: 100%;
        }

        .btn-go-reports:hover {
            background-color: #059669;
        }
    </style>
</head>

<body>

    <div class="welcome-card">
        <div class="logo-placeholder">
            <i class="fa-solid fa-chart-pie"></i>
        </div>
        <h1>AKLTECH System</h1>
        <p>مرحباً بك في نظام إدارة AKLTECH. يمكنك الانتقال مباشرةً لمعاينة صفحة التقارير والتحليلات المتقدمة.</p>

        <!-- تم تعديل المسار هنا ليتوجه مباشرة إلى صفحة التقارير المرفقة -->
        <a href="reports/reports.html" class="btn-go-reports">
            عرض التقارير والتحليلات <i class="fa-solid fa-chart-line"></i>
        </a>
    </div>

</body>

</html>
